<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.55" stop-color="#7641f1"/>
      <stop offset="1" stop-color="#5b2bc9"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="120" y1="120" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ded2ff" stop-opacity="0.75"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="24" y="24" width="464" height="464" rx="116" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="116" fill="url(#glow)"/>
  <rect x="25.5" y="25.5" width="461" height="461" rx="114.5" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="3"/>

  <!-- progress ring (open at top) -->
  <path d="M 370.9 159.6 A 150 150 0 1 1 204.7 115.1"
        fill="none" stroke="url(#ring)" stroke-width="30" stroke-linecap="round"/>
  <!-- endpoint dot -->
  <circle cx="204.7" cy="115.1" r="15" fill="#ffffff"/>

  <!-- checkmark -->
  <path d="M 194 258 L 236 302 L 324 194"
        fill="none" stroke="#ffffff" stroke-width="40"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
