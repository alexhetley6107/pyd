<div
  #container
  class="select-container"
  tabindex="1"
  (click)="toggleOpen()"
  [class.sm]="size() === 'sm'"
  [class.lg]="size() === 'lg'"
>
  <div class="selected-value" [class.placeholder]="!value()">
    {{ selectedLabel() || placeholder() }}
  </div>
  <ui-icon name="chevron-left" [size]="size() === 'sm' ? 20 : 28" [class.open]="open()" class="arrow" />

  @if (open()) {
    <ul class="options-list" role="listbox">
      @for (option of options(); track option.value) {
        <li
          (click)="select(option)"
          [class.nullable]="!!option.value"
          [class.selected]="option.value === value()"
          role="option"
          [attr.aria-selected]="option.value === value()"
          tabindex="-1"
        >
          {{ option.label }}
        </li>
      }
    </ul>
  }
</div>
