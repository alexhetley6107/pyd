<div class="flex align-center justify-between mb-10">
  <ui-breadcrumbs [links]="links()" [loading]="isFetching()" />

  <ui-button variant="outlined" size="sm" (click)="toggleDeleteModal()">Delete</ui-button>
</div>

<task-form
  [boardId]="boardId()"
  [title]="currentTask()?.title ?? ''"
  [description]="currentTask()?.description ?? ''"
  [priority]="currentTask()?.priority ?? ''"
  [status]="currentTask()?.status ?? ''"
/>

<task-delete-modal [open]="isModal()" (closeModal)="toggleDeleteModal()" />
