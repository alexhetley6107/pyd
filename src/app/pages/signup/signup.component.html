<form
  [formGroup]="form"
  (ngSubmit)="handleSubmit()"
  (keydown.enter)="handleSubmit()"
  class="auth-form"
>
  <h1 class="">Sign up</h1>

  <ui-input formControlName="nickname" [error]="nicknameError" placeholder="Nickname" fullWidth />
  <ui-input
    formControlName="email"
    [error]="emailError"
    placeholder="Email"
    type="email"
    fullWidth
  />
  <ui-input
    formControlName="password"
    [error]="passwordError"
    placeholder="Password"
    type="password"
    fullWidth
  />
  <ui-input
    formControlName="confirmPassword"
    [error]="confirmPasswordError"
    placeholder="Confirm your password"
    type="password"
    fullWidth
  />

  <ui-button fullWidth size="lg" [loading]="isLoading" type="submit">Sign up</ui-button>

  <div class="text-center">
    <a routerLink="/login"> Already have an account? Login</a>
  </div>
</form>
