<div
  class="wrapper"
  [ngClass]="{
    sm: size === 'sm',
    lg: size === 'lg',
    error: !!error,
    outlined: variant === 'outlined',
    underlined: variant === 'underlined',
  }"
>
  <input
    [placeholder]="placeholder"
    [type]="isPasswordVisible ? 'text' : type"
    [value]="value"
    (input)="handleInput($event)"
    (blur)="handleBlur()"
  />

  @if (type === 'password') {
    <button class="eye" (mousedown)="togglePassword($event)" type="button">
      <ui-icon [name]="isPasswordVisible ? 'eye-on' : 'eye-off'" [size]="26" />
    </button>
  }

  <div class="error">
    @if (error) {
      <span>* {{ error }}</span>
    }
  </div>
</div>
