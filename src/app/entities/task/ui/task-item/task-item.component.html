<div class="wrapper" (click)="handleClick()">
  <div class="prio_line" [ngClass]="task?.priority"></div>
  <div class="content">
    <p class="title" [class.done]="isDone">{{ task?.title }}</p>
    <p class="desc">{{ task?.description }}</p>
    <p class="priority">{{ task?.priority }}</p>
  </div>
</div>
