<div class="upload">
  <label class="upload-box">
    <input #fileInput type="file" (change)="onFileChange($event)" hidden />

    @if (preview()) {
      <img [src]="preview()" alt="preview" />
    } @else {
      <span>Upload photo</span>
    }
  </label>
</div>

@if (isOriginalImage()) {
  <ui-button variant="outlined" (click)="openFilePicker()">Update</ui-button>
} @else {
  <ui-button [loading]="loading()" (click)="upload()">Save</ui-button>
}
